<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Chamado</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .caixa { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        input, textarea, select { width: 95%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <a href="/painel.html" class="voltar">⬅ Voltar para o Painel</a>
    <div class="caixa">
        <h2>Abrir Novo Chamado</h2>
        <form method="POST" action="/api/chamados">
            
            <label>Categoria:</label><br>
            <select name="categoria" required>
                <option value="">Selecione uma opção...</option>
                <option value="Hardware">Hardware / Equipamentos</option>
                <option value="Sistemas">Sistemas e Softwares</option>
                <option value="Redes">Redes (Internet, Wi-Fi, DNS, DHCP)</option>
                <option value="Outros">Outros / Dúvidas</option>
            </select>

            <label>Qual o problema? (Título):</label><br>
            <input type="text" name="titulo" required>
            
            <label>Descreva com detalhes:</label><br>
            <textarea name="descricao" rows="5" required></textarea>
            
            <button type="submit">Enviar Chamado</button>
        </form>
    </div>
</body>
</html>
